<body data-page="contact" data-prefix="">
  <a class="skip-link" href="#main-content" data-i18n="common.skip">تجاوز إلى المحتوى</a>
  <div id="site-header"></div>
  <main id="main-content">
    <section class="page-hero compact-hero">
      <div class="container page-hero-grid">
        <div class="reveal">
          <p class="eyebrow">APP_NAME</p>
          <h1 data-i18n="contact.title">التواصل</h1>
          <p class="lead" data-i18n="contact.lead">استقبل رسائل المستخدمين والشركاء من نموذج آمن ومربوط بـ Supabase.</p>
        </div>
        <div class="page-hero-panel reveal">
          <span class="signal-dot"></span>
          <strong data-i18n="common.siteScope">موقع دعائي وإداري</strong>
          <p data-i18n="common.siteScopeText">هذا الموقع منفصل عن Backend تطبيق الشات واللايف المستقبلي.</p>
        </div>
      </div>
    </section>
    <section class="section"><div class="container split-grid"><div class="info-card reveal"><h2>بيانات التواصل</h2><p data-config-email dir="ltr">hello@example.com</p><p data-config-whatsapp dir="ltr">+20 100 000 0000</p><p>يمكن تعديل البريد والواتساب من assets/js/config.js.</p></div><div class="reveal"><form class="form-panel" data-form="contact" novalidate>
          <label class="hp-field" aria-hidden="true">
            <span>اترك هذا الحقل فارغًا</span>
            <input type="text" name="website" tabindex="-1" autocomplete="off">
          </label>
          <input type="hidden" name="started_at" value="">
          <div class="form-grid">
            <label class="field">
            <span>الاسم</span>
            <input name="full_name" type="text" required minlength="2">
          </label>
            <label class="field">
            <span>البريد الإلكتروني</span>
            <input name="email" type="email" required>
          </label>
            <label class="field">
            <span>رقم الهاتف اختياري</span>
            <input name="phone" type="tel" dir="ltr">
          </label>
            
            <label class="field">
            <span>الموضوع</span>
            <input name="subject" type="text" required minlength="3">
          </label>
            <label class="field field-full">
            <span>الرسالة</span>
            <textarea name="message" rows="5" required minlength="10"></textarea>
          </label>
          </div>
          <button class="btn btn-primary" type="submit">إرسال</button>
          <p class="form-alert" data-form-alert role="status" aria-live="polite"></p>
        </form></div></div></section>
  </main>
