<body data-page="admin" data-admin-page="login" data-prefix="../" >
  <a class="skip-link" href="#main-content">تجاوز إلى المحتوى</a>
  <div id="site-header"></div>
  <main id="main-content" class="admin-main">
    <section class="admin-login-section">
      <div class="admin-login-card">
        <p class="eyebrow">Admin</p>
        <h1>تسجيل دخول الإدارة</h1>
        <p>الدخول يتم عبر Supabase Auth، ثم يتم التأكد من وجود المستخدم في جدول admin_users.</p>
        <form class="form-panel" data-login-form novalidate>
          <label class="field"><span>Email</span><input name="email" type="email" required dir="ltr" autocomplete="email"></label>
          <label class="field password-field"><span>Password</span><input name="password" type="password" required autocomplete="current-password"><button type="button" class="ghost-toggle" data-toggle-password>إظهار</button></label>
          <button class="btn btn-primary" type="submit">دخول</button>
          <p class="form-alert" data-auth-alert role="status" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>
